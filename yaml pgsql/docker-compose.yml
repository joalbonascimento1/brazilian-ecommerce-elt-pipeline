version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: joalbo
      POSTGRES_PASSWORD: joalbo
      POSTGRES_DB: dbtestes
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: